{% extends "admin/change_list.html" %}

{% block object-tools-items %}
    {{ block.super }}
    <li class="ml-2">
        <a href="/inventario/salida/" class="btn btn-info btn-sm text-white font-weight-bold">
            <i class="fas fa-shipping-fast mr-1"></i> Despacho Masivo (Salidas)
        </a>
    </li>
{% endblock %}

{% block result_list %}
    {{ block.super }}
    
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // 1. Re-estructurar encabezados principales de la Guía usando los colspans proporcionales corregidos
            const mainThead = document.querySelector("#result_list thead tr");
            if(mainThead) {
                mainThead.innerHTML = `
                    <th style="width: 10%; text-align: center;">Acción</th>
                    <th>N° Guía de Remisión</th>
                    <th style="text-align: center;" colspan="2">Volumen de Carga</th>
                    <th colspan="5">Cliente / Destino</th>
                    <th>Fecha de Despacho</th>
                `;
            }

            const filas = document.querySelectorAll("#result_list tbody tr");
            const guias = {};

            // 2. Agrupar las filas por número de guía
            filas.forEach(fila => {
                const celdaGuia = fila.querySelector(".field-n_guia_salida");
                if(!celdaGuia) return;
                
                const nGuia = celdaGuia.textContent.trim();
                if (!guias[nGuia]) {
                    guias[nGuia] = {
                        cliente: fila.querySelector(".field-cliente") ? fila.querySelector(".field-cliente").textContent.trim() : "-",
                        fecha: fila.querySelector(".field-fecha_salida") ? fila.querySelector(".field-fecha_salida").textContent.trim() : "-",
                        nodos: []
                    };
                }
                guias[nGuia].nodos.push(fila);
            });

            const tbody = document.querySelector("#result_list tbody");
            if(!tbody) return;
            tbody.innerHTML = ""; 

            let contadorGuia = 0;

            // 3. Re-construir la estructura con sub-cabeceras de Hardware compactadas
            Object.keys(guias).forEach(nGuia => {
                contadorGuia++;
                const datos = guias[nGuia];
                const cantidadUnidades = datos.nodos.length;
                const claseColapso = `detalle-guia-${contadorGuia}`;

                // Fila Maestra (Datos consolidados de la Guía)
                const filaPadre = document.createElement("tr");
                filaPadre.className = "bg-light font-weight-bold table-warning text-dark";
                filaPadre.style.cursor = "pointer";
                filaPadre.innerHTML = `
                    <td class="text-center align-middle">
                        <button type="button" class="btn btn-sm btn-dark btn-toggle-guia" data-target=".${claseColapso}">
                            <i class="fas fa-chevron-down mr-1"></i> Ver Detalles
                        </button>
                    </td>
                    <td class="align-middle">${nGuia}</td>
                    <td class="align-middle text-center" colspan="2"><span class="badge badge-primary px-3 py-2" style="font-size:0.92rem;"><i class="fas fa-boxes mr-1"></i> ${cantidadUnidades} Unidades</span></td>
                    <td class="align-middle" colspan="5">${datos.cliente}</td>
                    <td class="align-middle">${datos.fecha}</td>
                `;
                tbody.appendChild(filaPadre);

                // 🌟 SUB-CABECERA INTERNA COMPACTADA (Fiel a tus nuevos campos) 🌟
                const filaSubHeader = document.createElement("tr");
                filaSubHeader.className = `${claseColapso} d-none bg-dark text-white font-weight-bold`;
                filaSubHeader.style.fontSize = "0.85rem";
                filaSubHeader.innerHTML = `
                    <td class="text-center bg-secondary"><i class="fas fa-arrow-right"></i></td>
                    <td>Guía Origen</td>
                    <td>Número de Serie</td>
                    <td>Producto / Modelo</td>  <!-- Fusión de espacio -->
                    <td>Procesador</td>
                    <td>Generación</td>
                    <td>RAM Final</td>
                    <td>Disco Final</td>
                    <td>Cliente / Destino</td>
                    <td>Fecha Despacho</td>
                `;
                tbody.appendChild(filaSubHeader);

                // Inyectar las filas subordinadas
                datos.nodos.forEach(filaHija => {
                    filaHija.classList.add(claseColapso, "d-none", "bg-white");
                    const celdaBoton = filaHija.cells[0];
                    if(celdaBoton) celdaBoton.innerHTML = '<i class="fas fa-level-up-alt fa-rotate-90 text-muted ml-3"></i>';
                    tbody.appendChild(filaHija);
                });
            });

            // 4. Controlador de animación de despliegue
            document.querySelectorAll(".btn-toggle-guia").forEach(boton => {
                boton.addEventListener("click", function(e) {
                    e.stopPropagation();
                    const targetSelector = this.getAttribute("data-target");
                    const subFilas = document.querySelectorAll(targetSelector);
                    const icono = this.querySelector("i");
                    
                    subFilas.forEach(f => f.classList.toggle("d-none"));
                    
                    if(icono.classList.contains("fa-chevron-down")) {
                        icono.className = "fas fa-chevron-up mr-1";
                    } else {
                        icono.className = "fas fa-chevron-down mr-1";
                    }
                });
            });
        });
    </script>
{% endblock %}
